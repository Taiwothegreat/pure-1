
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
          margin: 0;
          padding: 0;
        }
      
        .foot {
          margin-top: 100px;
          width: 100vw;
          overflow-x: hidden;
        }
      
        .foot-2 {
          position: relative;
          background-color: transparent;
          line-height: 0;
          margin-bottom: -1px;
        }
      
        .footer {
          background-color: rgb(4, 31, 4);
          padding: 30px 0;
          color: white;
          width: 100vw;
          margin-top: -5px;
        }
      
        .footer .container {
          max-width: 1200px;
        }
      
        /* Remove horizontal spacing on small screens */
        .container-fluid,
        .container {
          padding-left: 0;
          padding-right: 0;
        }
      
        .footer-select select {
          background-color: #29226b;
          color: #ffffff;
        }
      
        ul {
          padding-left: 0;
          list-style: none;
        }
      </style>
</head>
<body>
    <div class="foot">
        <div class="foot-2">
          <svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg" style="display: block; width: 100vw; height: 100px; transform: scaleY(-1);">
            <path fill="rgb(4, 31, 4)" d="M0,32L60,42.7C120,53,240,75,360,74.7C480,75,600,53,720,53.3C840,53,960,75,1080,80C1200,85,1320,75,1380,69.3L1440,64L1440,0L1380,0C1320,0,1200,0,1080,0C960,0,840,0,720,0C600,0,480,0,360,0C240,0,120,0,60,0L0,0Z"></path>

              </div>
              <div class="col-md-6 footer-select">
                <select class="form-control">
                  <option value="en">English</option>
                  <option value="fr">French</option>
                  <option value="es">Spanish</option>
                  <option value="dt">Dutch</option>
                  <option value="ar">Arabic</option>
                  <option value="ch">Chinese</option>
                  <option value="pt">Portuguese</option>
                  <option value="rs">Russian</option>
                  <option value="tr">Turkish</option>
                  <option value="yr">Yoruba</option>
                  <option value="ig">Igbo</option>
                  <option value="ha">Hausa</option>
                </select>
              </div>
            </div>
      
            <hr style="border-color: #fff;">
      
            <div class="row">
              <div class="col-sm-3 foot2">
                <h4>Useful Links</h4>
                <ul>
                  <li><a href="#" class="text-white">Sustainability</a></li>
                  <li><a href="#" class="text-white">Responsibility</a></li>
                  <li><a href="#" class="text-white">Terms Of Use</a></li>
                  <li><a href="#" class="text-white">Brands Protection</a></li>
                </ul>
              </div>
      
              <div class="col-sm-3 foot2">
                <h4>Information</h4>
                <ul>
                  <li><a href="#" class="text-white">Cookies Setting</a></li>
                  <li><a href="#" class="text-white">Imprint</a></li>
                  <li><a href="#" class="text-white">Fraud Warning</a></li>
                  <li><a href="#" class="text-white">Privacy Policy</a></li>
                </ul>

              <div class="col-sm-3 foot2"></div>
      
              <div class="col-sm-3 foot2">

                <i class="fab fa-tiktok fa-2x"></i>
                <i class="fab fa-twitter fa-2x"></i>
                <i class="fab fa-instagram fa-2x"></i>
                <i class="fab fa-threads fa-2x"></i>
              </div>
            </div>
      
            <hr style="border-color: #fff;">
      
            <div class="row text-center" style="margin-top: 20px;">
              <div class="col-sm-12">
                <p>© 2025. The Pure Finest Inc.® Company. All rights reserved.</p>
